<!DOCTYPE html>
<html>
<head>
<title>Solace</title>

<style>
body{
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:100px;
}

h1{
    font-size:72px;
    margin-bottom:10px;
    letter-spacing:3px;
}
p{
    color:#ffffff;
    font-size:32px;
    font-weight:600;
    text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

textarea{
    width:650px;
    height:150px;
    border-radius:20px;
    padding:20px;
    margin-top:20px;

    background:rgba(22,27,34,0.85);
    color:white;
    border:1px solid rgba(255,255,255,0.15);

    font-size:20px;
    font-family:Arial, sans-serif;
}
    textarea::placeholder{
    color:#b8c1cc;
    font-size:18px;
}
button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#7c3aed;
    color:white;
    font-size:18px;
    cursor:pointer;
    img{
    margin-bottom:20px;
}
}
</style>

</head>

<body>


<img src="logo.png" alt="Solace Logo" width="300">

<p>
Discover places that match your mood, not the crowd.
</p>

<textarea id="userInput" placeholder="Describe your ideal place..."></textarea>

<br>

<button onclick="findPlace()">Find My Place</button>

<<h2 id="resultsTitle" style="display:none; margin-top:40px;">
Your Matches
</h2>

<div id="results" style="margin-top:20px;"></div>

    <script>
async function findPlace() {

    const userText = document.getElementById("userInput").value.toLowerCase();

    const response = await fetch("places.json");
    const places = await response.json();

  let matches = [];

places.forEach(place => {
    let score = 0;

    const searchableText = `
        ${place.name}
        ${place.city}
        ${place.description}
        ${place.tags.join(" ")}
        ${place.budget}
        ${place.best_time}
        ${place.crowd}
    `.toLowerCase();

    const userWords = userText
        .split(" ")
        .map(word => word.trim())
        .filter(word => word.length > 2);

    userWords.forEach(word => {
        if (searchableText.includes(word)) {
            score++;
        }
    });

    if (score > 0) {
        matches.push({
            ...place,
            score: score
        });
    }
});

matches.sort((a, b) => b.score - a.score);
matches = matches.slice(0, 5);
    let html = "";

    if(matches.length === 0){
        html = "<p>No matches found yet.</p>";
    } else {

        matches.forEach(place => {
            html += `
                <div style="background:#161b22;padding:20px;border-radius:15px;margin:15px auto;max-width:700px;">
                    <h2>${place.name}</h2>
                    <p>${place.description}</p>
                </div>
            `;
        });
    }

    document.getElementById("resultsTitle").style.display = "block";
document.getElementById("results").innerHTML = html;
}
</script>
</body>
</html>
