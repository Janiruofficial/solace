<style>

</head>

<body>


<img src="logo.png" alt="Solace Logo" width="300">

<p>
Discover places that match your mood, not the crowd.
</p>

<textarea id="userInput" placeholder="Describe your ideal place..."></textarea>

<div class="filters">
  <select id="budgetFilter">
    <option value="">Any budget</option>

  <select id="timeFilter">
    <option value="">Any time</option>
    <option value="morning">Morning</option>

  <select id="moodFilter">
    <option value="">Any mood</option>

</div>
<div class="top-search">

</div>
<br>

<button onclick="findPlace()">Find My Place</button>
<button onclick="showAllPlaces()">All Places</button>

<br><br>

<button onclick="signInWithGoogle()">🌙 Sign in with Google</button>
<button onclick="logoutUser()">Logout</button>
<button onclick="showSavedPlaces()">❤️ My Saved Places</button>
    <button onclick="showRecentlyViewed()">🕘 Recently Viewed</button>
<button class="social-button" onclick="window.open('https://www.linkedin.com/company/findsolaceai/', '_blank')">🔗 Solace LinkedIn</button>

<button class="social-button" onclick="window.open('https://www.instagram.com/find.solace.ai?igsh=MWt1cGxzM3J1MTd4OQ==', '_blank')">📸 Solace Instagram</button>
<p id="userInfo"></p>
<<h2 id="resultsTitle" style="display:none; margin-top:40px;">
Your Matches
</h2>

<div id="results" style="margin-top:20px;"></div>

    <script>
async function findPlace() {

    const userText = document.getElementById("userInput").value.toLowerCase();

    const response = await fetch("places.json");
    const places = await response.json();

let matches = [];

const budgetFilter = document.getElementById("budgetFilter").value;
const crowdFilter = document.getElementById("crowdFilter").value;
const timeFilter = document.getElementById("timeFilter").value.toLowerCase();
const moodFilter = document.getElementById("moodFilter").value.toLowerCase();
const aestheticFilter = document.getElementById("aestheticFilter").value.toLowerCase();

places.forEach(place => {
    let score = 0;
    if (userText.includes(place.name.toLowerCase())) {
    score += 10;
}

if (userText.includes(place.city.toLowerCase())) {
    score += 6;
}

    const searchableText = `
        ${place.name}
        ${place.city}
        ${place.description}
        ${place.tags.join(" ")}
        ${place.moods.join(" ")}
        ${place.aesthetics.join(" ")}
        ${place.activities.join(" ")}
        ${place.budget_label}
        ${place.crowd_label}
        ${place.best_time.join(" ")}
    `.toLowerCase();

  const moodMap = {
    "burnt": ["peaceful", "calm", "healing", "quiet", "relaxed"],
    "burnout": ["peaceful", "calm", "healing", "quiet", "relaxed"],
    "stress": ["peaceful", "calm", "relaxing", "quiet", "nature"],
    "stressed": ["peaceful", "calm", "relaxing", "quiet", "nature"],
    "sad": ["healing", "peaceful", "reflective", "quiet"],
    "lonely": ["reflective", "peaceful", "solo", "quiet"],
    "alone": ["solo", "private", "quiet", "secluded"],
    "peace": ["peaceful", "calm", "quiet"],
    "quiet": ["quiet", "peaceful", "low", "uncrowded"],
    "escape": ["escape", "free", "secluded", "nature"],
    "free": ["free", "open", "wild", "nature"],
    "inspired": ["inspired", "cinematic", "viewpoint", "creative"],
    "luxury": ["luxury", "modern", "premium", "city"],
    "city": ["city", "urban", "modern", "skyline"],
    "nature": ["nature", "green", "forest", "mountain", "beach"],
    "beach": ["beach", "ocean", "sea", "waves"],
    "mountain": ["mountain", "misty", "cool", "viewpoint"]
};

let expandedText = userText;

Object.keys(moodMap).forEach(key => {
    if (userText.includes(key)) {
        expandedText += " " + moodMap[key].join(" ");
    }
});

const userWords = expandedText
    .split(" ")
    .map(word => word.trim())
    .filter(word => word.length > 2);
    userWords.forEach(word => {
        if (searchableText.includes(word)) {
    score += 2;
}
    });

    if (budgetFilter !== "" && place.budget <= Number(budgetFilter)) {
        score += 3;
    } else if (budgetFilter !== "") {
        score -= 5;
    }

    if (crowdFilter !== "" && place.crowd <= Number(crowdFilter)) {
        score += 3;
    } else if (crowdFilter !== "") {
        score -= 5;
    }

    if (timeFilter !== "" && place.best_time.map(t => t.toLowerCase()).includes(timeFilter)) {
        score += 3;
    } else if (timeFilter !== "") {
        score -= 3;
    }

    if (moodFilter !== "" && place.moods.map(m => m.toLowerCase()).includes(moodFilter)) {
        score += 4;
    } else if (moodFilter !== "") {
        score -= 3;
    }

    if (aestheticFilter !== "" && place.aesthetics.map(a => a.toLowerCase()).includes(aestheticFilter)) {
        score += 4;
    } else if (aestheticFilter !== "") {
        score -= 3;
    }

    if (score > 0 || userText.trim() === "") {
        matches.push({
            ...place,
            score: score
        });
    }
});

matches.sort((a, b) => b.score - a.score);
matches = matches.slice(0, 5);
    let html = "";

    if(matches.length === 0){
        html = "<p>No matches found yet.</p>";
    } else {

    matches.forEach(place => {
    html += `
        <button onclick="window.showPlaceDetailsBySavedName('${place.name.replaceAll("'", "\\'")}')"
                class="match-button">

            <div class="match-info">
                <h2>${place.name}</h2>
                <p>📍 ${place.city}</p>
                <p>${place.description}</p>
            </div>

        </button>
    `;
});
    }

    document.getElementById("resultsTitle").style.display = "block";
document.getElementById("results").innerHTML = html;
}
        async function showAllPlaces() {
    const response = await fetch("places.json");
    const places = await response.json();

    let html = "<h2>All Places</h2>";

   places.forEach((place, index) => {
    html += `
       <div onclick="window.showPlaceDetailsByIndex(${index})"
     class="place-list-card">
    <h2>${place.name}</h2>
    <p>📍 ${place.city}</p>
</div>
    `;
});

    document.getElementById("results").innerHTML = html;
}
       window.showPlaceDetailsByIndex = async function(index) {
    const response = await fetch("places.json");
    const places = await response.json();

    window.showPlaceDetails(places[index]);
}

window.showPlaceDetails = function(place) {
   window.saveRecentlyViewed(place.name);
    let html = `
        <div class="place-detail-card">

            <h2 class="place-title">${place.name}</h2>
            <p class="place-city">📍 ${place.city}</p>

            <h3>🌙 How It Feels</h3>
            <img src="${place.mood_image}" class="place-image">

            <h3>📍 Real Place</h3>
            <img src="${place.real_image}" class="place-image">

            <p class="place-description">${place.description}</p>

            <div class="badges">
                <span>💰 ${place.budget_label}</span>
                <span>👥 ${place.crowd_label}</span>
                <span>🕒 ${place.best_time.join(", ")}</span>
            </div>

            <div class="section">
                <strong>Moods</strong>
                <p>${place.moods.join(" • ")}</p>
            </div>

            <div class="section">
                <strong>Aesthetics</strong>
                <p>${place.aesthetics.join(" • ")}</p>
            </div>

           ${window.currentUser ? `<button onclick="savePlace('${place.name.replaceAll("'", "\\'")}')">❤️ Save Place</button>` : ""}
           ${place.map_link ? `<button onclick="window.open('${place.map_link}', '_blank')">📍 Open in Google Maps</button>` : ""}
<button onclick="window.sharePlace('${place.name.replaceAll("'", "\\'")}')">

    📋 Copy Share Text
</button>
<button onclick="showAllPlaces()">Back to All Places</button>
        </div>
    `;

    document.getElementById("results").innerHTML = html;
}
    
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";
    const firebaseConfig = {
  apiKey: "AIzaSyCw_Ro5WrZ94vnbvleHU4ZhzLDspqz0nLY",
  authDomain: "solace-d6976.firebaseapp.com",
  projectId: "solace-d6976",
  storageBucket: "solace-d6976.firebasestorage.app",
  messagingSenderId: "956909521917",
  appId: "1:956909521917:web:cef645d3f690c893b02794"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

window.currentUser = null;
 
window.signInWithGoogle = function() {
    signInWithPopup(auth, provider)
      .catch((error) => {
          alert(error.message);
      });
};

window.logoutUser = function() {
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  const userInfo = document.getElementById("userInfo");
  window.currentUser = user;

  if (user) {
    userInfo.innerHTML = `👤 Welcome, ${user.displayName}`;
  } else {
    userInfo.innerHTML = "";
  }
});
   window.savePlace = async function(placeName) {
  if (!window.currentUser) {
    alert("Please sign in with Google first.");
    return;
  }

  const safePlaceId = placeName.replaceAll("/", "-").replaceAll("'", "");

  await setDoc(
    doc(db, "users", window.currentUser.uid, "savedPlaces", safePlaceId),
    {
      placeName: placeName,
      savedAt: serverTimestamp()
    }
  );

  alert(`${placeName} saved 🌙`);
};

window.removeSavedPlace = async function(placeName) {
  if (!window.currentUser) {
    alert("Please sign in with Google first.");
    return;
  }

  const safePlaceId = placeName.replaceAll("/", "-").replaceAll("'", "");

  await deleteDoc(
    doc(db, "users", window.currentUser.uid, "savedPlaces", safePlaceId)
  );

  alert(`${placeName} removed`);
  showSavedPlaces();
};
    window.showSavedPlaces = async function() {
  if (!window.currentUser) {
    alert("Please sign in with Google first.");
    return;
  }

  const savedRef = collection(db, "users", window.currentUser.uid, "savedPlaces");
  const snapshot = await getDocs(savedRef);

  const response = await fetch("places.json");
  const allPlaces = await response.json();

  let html = "<h2>❤️ My Saved Places</h2>";

  if (snapshot.empty) {
    html += "<p>You have not saved any places yet.</p>";
  } else {
    snapshot.forEach((docSnap) => {
      const savedPlaceName = docSnap.data().placeName;
      const place = allPlaces.find(p => p.name === savedPlaceName);

      if (place) {
        html += `
<div class="place-list-card">

    <div onclick="window.showPlaceDetailsBySavedName('${place.name.replaceAll("'", "\\'")}')">
        <h2>${place.name}</h2>
        <p>${place.city}</p>
    </div>

    <button
     onclick="event.stopPropagation(); removeSavedPlace('${place.name.replaceAll("'", "\\'")}')"
      style="margin-top:10px;background:#c0392b;">
      ❌ Remove
    </button>

</div>
`;
      }
    });
  }

  document.getElementById("results").innerHTML = html;
};
window.sharePlace = function(placeName) {
  const shareText =
    "🌙 Check out " + placeName + " on Solace AI\n\n" +
    "Discover places that match your mood.\n\n" +
    "https://janiruofficial.github.io/solace/";

  navigator.clipboard.writeText(shareText)
    .then(() => {
      alert("📋 Share text copied!");
    })
    .catch(() => {
      alert(shareText);
    });
};
window.showPlaceDetailsBySavedName = async function(placeName) {
  const response = await fetch("places.json");
  const places = await response.json();

  const place = places.find(p => p.name === placeName);

  if (place) {
   window.showPlaceDetails(place);
  }
};
  window.saveRecentlyViewed = function(placeName) {
    let recent = JSON.parse(localStorage.getItem("recentlyViewed")) || [];

    recent = recent.filter(name => name !== placeName);
    recent.unshift(placeName);
    recent = recent.slice(0, 5);

    localStorage.setItem("recentlyViewed", JSON.stringify(recent));
};

window.showRecentlyViewed = async function() {
    const recent = JSON.parse(localStorage.getItem("recentlyViewed")) || [];

    const response = await fetch("places.json");
    const places = await response.json();

    let html = "<h2>🕘 Recently Viewed</h2>";

    if (recent.length === 0) {
        html += "<p>No recently viewed places yet.</p>";
    } else {
        recent.forEach(placeName => {
            const place = places.find(p => p.name === placeName);

            if (place) {
                html += `
                    <div onclick="window.showPlaceDetailsBySavedName('${place.name.replaceAll("'", "\\'")}')"
     class="place-list-card">
                        <h2>${place.name}</h2>
                        <p>${place.city}</p>
                    </div>
                `;
            }
        });
    }

    document.getElementById("results").innerHTML = html;
};
    window.searchPlaceByName = async function() {
    const searchText = document.getElementById("placeSearchInput").value.toLowerCase();

    const response = await fetch("places.json");
    const places = await response.json();

    const matches = places.filter(place =>
        place.name.toLowerCase().includes(searchText) ||
        place.city.toLowerCase().includes(searchText)
    );

    let html = "<h2>Search Results</h2>";

    if (matches.length === 0) {
        html += "<p>No place found.</p>";
    } else {
        matches.forEach(place => {
            html += `
                <div onclick="window.showPlaceDetailsBySavedName('${place.name.replaceAll("'", "\\'")}')"
                     class="place-list-card">
                    <h2>${place.name}</h2>
                    <p>📍 ${place.city}</p>
                </div>
            `;
        });
    };

    document.getElementById("results").innerHTML = html;
}
    window.searchPlacesLive = async function() {

    const text =
        document.getElementById("placeSearchInput")
        .value
        .toLowerCase();

    const suggestionBox =
        document.getElementById("searchSuggestions");

    if(text.length < 2){
        suggestionBox.innerHTML = "";
        return;
    }

    const response = await fetch("places.json");
    const places = await response.json();

    const matches = places.filter(place =>
        place.name.toLowerCase().includes(text)
    );

    let html = "";

    matches.slice(0,8).forEach(place => {

        html += `
        <div class="search-item"
             onclick="openSearchPlace('${place.name.replaceAll("'", "\\'")}')">

            <strong>${place.name}</strong>
            <div class="search-city">${place.city}</div>

        </div>
        `;
    });

    suggestionBox.innerHTML = html;
};window.openSearchPlace = function(placeName){

    document.getElementById("searchSuggestions").innerHTML = "";

    document.getElementById("placeSearchInput").value = "";

    showPlaceDetailsBySavedName(placeName);
};
 
</script>

</body>
</html>
