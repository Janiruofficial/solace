async function findPlace() {

    const userText = document.getElementById("userInput").value.toLowerCase();

    const response = await fetch("places.json");
    const places = await response.json();

const moodFilter = document.getElementById("moodFilter").value.toLowerCase();
const aestheticFilter = document.getElementById("aestheticFilter").value.toLowerCase();

places.forEach(place => {
    let score = 0;
    if (userText.includes(place.name.toLowerCase())) {
    score += 10;
}

if (userText.includes(place.city.toLowerCase())) {
    score += 6;
}

    const searchableText = `
        ${place.name}
        ${place.city}
        ${place.description}
        ${place.tags.join(" ")}
        ${place.moods.join(" ")}
        ${place.aesthetics.join(" ")}
        ${place.activities.join(" ")}
        ${place.budget_label}
        ${place.crowd_label}
        ${place.best_time.join(" ")}

  const moodMap = {
    "burnt": ["peaceful", "calm", "healing", "quiet", "relaxed"],
    "burnout": ["peaceful", "calm", "healing", "quiet", "relaxed"],
    "stress": ["peaceful", "calm", "relaxing", "quiet", "nature"],
    "stressed": ["peaceful", "calm", "relaxing", "quiet", "nature"],
    "sad": ["healing", "peaceful", "reflective", "quiet"],
    "lonely": ["reflective", "peaceful", "solo", "quiet"],
    "alone": ["solo", "private", "quiet", "secluded"],
    "peace": ["peaceful", "calm", "quiet"],
    "quiet": ["quiet", "peaceful", "low", "uncrowded"],
    "escape": ["escape", "free", "secluded", "nature"],
    "free": ["free", "open", "wild", "nature"],
    "inspired": ["inspired", "cinematic", "viewpoint", "creative"],
    "luxury": ["luxury", "modern", "premium", "city"],
    "city": ["city", "urban", "modern", "skyline"],
    "nature": ["nature", "green", "forest", "mountain", "beach"],
    "beach": ["beach", "ocean", "sea", "waves"],
    "mountain": ["mountain", "misty", "cool", "viewpoint"]
};

let expandedText = userText;

Object.keys(moodMap).forEach(key => {
    if (userText.includes(key)) {
        expandedText += " " + moodMap[key].join(" ");
    }
});

const userWords = expandedText
    .split(" ")
    .map(word => word.trim())
    .filter(word => word.length > 2);
    userWords.forEach(word => {
        if (searchableText.includes(word)) {
    score += 2;
}
    });

    if (budgetFilter !== "" && place.budget <= Number(budgetFilter)) {
        score += 3;
    } else if (budgetFilter !== "") {
        score -= 5;
    }

    if (crowdFilter !== "" && place.crowd <= Number(crowdFilter)) {
        score += 3;
    } else if (crowdFilter !== "") {
        score -= 5;
    }

    if (timeFilter !== "" && place.best_time.map(t => t.toLowerCase()).includes(timeFilter)) {
        score += 3;
    } else if (timeFilter !== "") {
        score -= 3;
    }

    if (moodFilter !== "" && place.moods.map(m => m.toLowerCase()).includes(moodFilter)) {
        score += 4;
    } else if (moodFilter !== "") {
        score -= 3;
    }

    if (aestheticFilter !== "" && place.aesthetics.map(a => a.toLowerCase()).includes(aestheticFilter)) {
        score += 4;
    } else if (aestheticFilter !== "") {
        score -= 3;
    }

    if (score > 0 || userText.trim() === "") {
        matches.push({
            ...place,
            score: score
        });
    }
});

matches.sort((a, b) => b.score - a.score);
matches = matches.slice(0, 5);
    let html = "";

    if(matches.length === 0){
        html = "<p>No matches found yet.</p>";
    } else {

    matches.forEach(place => {
    const matchPercent = Math.min(99, Math.max(72, 70 + place.score * 3));
    const previewTags = [
        ...(place.moods || []),
        ...(place.tags || [])
    ].slice(0, 4);

    html += `

                <p class="match-city">📍 ${place.city}</p>

                <p class="match-desc">${place.description}</p>

                <div class="match-tags">
                    ${previewTags.map(tag => `<span>${tag}</span>`).join("")}
                </div>
            </div>

            <div class="match-arrow">›</div>

        </div>
    `;
});
    }

    document.getElementById("resultsTitle").style.display = "block";
document.getElementById("results").innerHTML = html;
}

             onclick="openSearchPlace('${place.name.replaceAll("'", "\\'")}')">

            <strong>${place.name}</strong>
            <div class="search-city">${place.city}</div>

        </div>
        `;
    });

    suggestionBox.innerHTML = html;
};window.openSearchPlace = function(placeName){

    document.getElementById("searchSuggestions").innerHTML = "";

    document.getElementById("placeSearchInput").value = "";

    showPlaceDetailsBySavedName(placeName);
};

window.createSparkles = function(){
    for(let i = 0; i < 30; i++){
        const sparkle = document.createElement("div");

        sparkle.className = "sparkle";
        sparkle.innerHTML = ["✨","🌙","⭐"][Math.floor(Math.random() * 3)];

        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = Math.random() * 100 + "vh";

        document.body.appendChild(sparkle);

        setTimeout(() => {
            sparkle.remove();
        }, 1300);
    }
};
