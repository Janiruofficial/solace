<!DOCTYPE html>
<html>
<head>
<title>Solace</title>

<style>
body{
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:100px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

p{
    color:#c9d1d9;
    font-size:20px;
}

textarea{
    width:500px;
    height:120px;
    border-radius:15px;
    padding:15px;
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#7c3aed;
    color:white;
    font-size:18px;
    cursor:pointer;
    img{
    margin-bottom:20px;
}
}
</style>

</head>

<body>


<img src="logo.png" alt="Solace Logo" width="300">

<p>
Discover places that match your mood, not the crowd.
</p>

<textarea id="userInput" placeholder="Describe your ideal place..."></textarea>

<br>

<button onclick="findPlace()">Find My Place</button>

<<h2 id="resultsTitle" style="display:none; margin-top:40px;">
Your Matches
</h2>

<div id="results" style="margin-top:20px;"></div>

    <script>
async function findPlace() {

    const userText = document.getElementById("userInput").value.toLowerCase();

    const response = await fetch("places.json");
    const places = await response.json();

    let matches = [];

    places.forEach(place => {

        const tags = place.tags.join(" ").toLowerCase();

        if (
            userText.includes("ocean") && tags.includes("ocean") ||
            userText.includes("beach") && tags.includes("ocean") ||
            userText.includes("peace") && tags.includes("peaceful") ||
            userText.includes("calm") && tags.includes("calm") ||
            userText.includes("luxury") && tags.includes("luxury")
        ) {
            matches.push(place);
        }
    });

    let html = "";

    if(matches.length === 0){
        html = "<p>No matches found yet.</p>";
    } else {

        matches.forEach(place => {
            html += `
                <div style="background:#161b22;padding:20px;border-radius:15px;margin:15px auto;max-width:700px;">
                    <h2>${place.name}</h2>
                    <p>${place.description}</p>
                </div>
            `;
        });
    }

    document.getElementById("resultsTitle").style.display = "block";
document.getElementById("results").innerHTML = html;
}
</script>
</body>
</html>
